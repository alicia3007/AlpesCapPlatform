<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>RFC1 - Historial por usuario (concurrencia)</title>
    <style>
        table { border-collapse: collapse; width: 100%; margin-bottom: 24px; }
        th, td { border: 1px solid #ccc; padding: 8px; }
        th { background: #f5f5f5; }
        .badge { display: inline-block; padding: 4px 8px; background: #eef; border: 1px solid #99c; border-radius: 4px; }
    </style>
    </head>
<body>
    <h1>RFC1 - Historial por usuario</h1>
    <p>
        Usuario: <strong th:text="${idUsuario}"></strong> — Aislamiento: <span class="badge" th:text="${aislamiento}"></span>
    </p>

    <h2>Consulta 1 (antes de esperar 30s)</h2>
    <table>
        <thead>
            <tr>
                <th>ID Servicio</th>
                <th>Tipo</th>
                <th>Inicio</th>
                <th>Fin</th>
                <th>Costo</th>
                <th>Partida</th>
                <th>Llegada</th>
                <th>Conductor</th>
                <th>Placa</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="fila : ${historialAntes}">
                <td th:text="${fila[0]}"></td>
                <td th:text="${fila[1]}"></td>
                <td th:text="${fila[2]}"></td>
                <td th:text="${fila[3]}"></td>
                <td th:text="${fila[4]}"></td>
                <td th:text="${fila[5]}"></td>
                <td th:text="${fila[6]}"></td>
                <td th:text="${fila[7]}"></td>
                <td th:text="${fila[8]}"></td>
            </tr>
        </tbody>
    </table>

    <h2>Consulta 2 (después de esperar 30s)</h2>
    <table>
        <thead>
            <tr>
                <th>ID Servicio</th>
                <th>Tipo</th>
                <th>Inicio</th>
                <th>Fin</th>
                <th>Costo</th>
                <th>Partida</th>
                <th>Llegada</th>
                <th>Conductor</th>
                <th>Placa</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="fila : ${historialDespues}">
                <td th:text="${fila[0]}"></td>
                <td th:text="${fila[1]}"></td>
                <td th:text="${fila[2]}"></td>
                <td th:text="${fila[3]}"></td>
                <td th:text="${fila[4]}"></td>
                <td th:text="${fila[5]}"></td>
                <td th:text="${fila[6]}"></td>
                <td th:text="${fila[7]}"></td>
                <td th:text="${fila[8]}"></td>
            </tr>
        </tbody>
    </table>

    <p>
        Volver a vista simple: <a th:href="@{'/usuarios/' + ${idUsuario} + '/historial-servicios'}">historial</a>
    </p>
</body>
</html>
