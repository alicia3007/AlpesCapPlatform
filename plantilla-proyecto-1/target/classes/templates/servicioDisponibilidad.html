<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>Disponibilidad Servicio</title>
</head>
<body>
  <h1>Modificar disponibilidad</h1>

  <!-- Mensaje de error -->
  <div th:if="${error}" style="color:red;">
    <p th:text="${error}"></p>
  </div>

  <!-- Muestra info básica del servicio si está en el model -->
  <div th:if="${servicio}">
    <p>Servicio: <span th:text="${servicio.idServicio}">ID</span></p>
    <p>Vehículo: <span th:text="${servicio.vehiculo != null ? servicio.vehiculo.idVehiculo : 'N/A'}">veh</span></p>
    <p>Conductor: <span th:text="${servicio.conductor != null ? servicio.conductor.idUsuario : 'N/A'}">cond</span></p>
  </div>

  <form th:action="@{|/servicios/${servicio.idServicio}/disponibilidad/save|}" method="post">
    <label>Hora inicio (yyyy-MM-dd'T'HH:mm)</label>
    <input type="datetime-local" name="horaInicio" /><br/>

    <label>Hora fin (yyyy-MM-dd'T'HH:mm)</label>
    <input type="datetime-local" name="horaFin" /><br/>

    <button type="submit">Guardar disponibilidad</button>
  </form>

  <p><a th:href="@{/servicios}">Volver a lista</a></p>
</body>
</html>
