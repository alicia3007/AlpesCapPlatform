<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registrar Viaje</title>
</head>
<body>
    <h1>Registrar viaje desde servicio</h1>

    <form th:action="@{/mongo/viajes/registrar}" method="post">
        <label for="servicioId">Servicio ID:</label>
        <input type="text" id="servicioId" name="servicioId" required />
        <button type="submit">Registrar</button>
    </form>

    <p>
        <a th:href="@{/mongo/viajes}">Volver a la lista de viajes</a>
    </p>

    <div th:if="${msg}">
        <p th:text="${msg}"></p>
    </div>
    <div th:if="${error}">
        <p style="color:red;" th:text="${error}"></p>
    </div>
</body>
</html>
