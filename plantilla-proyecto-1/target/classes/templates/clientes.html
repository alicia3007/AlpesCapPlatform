<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Clientes</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <h1>Lista de Clientes</h1>

    <a th:href="@{/clientes/new}">Registrar nuevo cliente</a>

    <table border="1" cellpadding="5" cellspacing="0">
        <thead>
            <tr>
                <th>ID Usuario</th>
                <th>Nombre</th>
                <th>Correo</th>
                <th>Celular</th>
                <th>Cédula</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="cliente : ${clientes}">
                <td th:text="${cliente.usuario.idUsuario}"></td>
                <td th:text="${cliente.usuario.nombre}"></td>
                <td th:text="${cliente.usuario.correo}"></td>
                <td th:text="${cliente.usuario.celular}"></td>
                <td th:text="${cliente.usuario.cedula}"></td>
            </tr>
        </tbody>
    </table>

</body>
</html>
