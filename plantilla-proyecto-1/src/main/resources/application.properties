# Tiempo máximo para obtener conexión (30 seg)
spring.datasource.hikari.connection-timeout=30000

# Tamaño del pool
spring.datasource.hikari.maximum-pool-size=5

# Tiempo máximo que una conexión puede estar viva (30 min)
spring.datasource.hikari.max-lifetime=1800000

# Mantén viva la conexión cada 5 minutos
