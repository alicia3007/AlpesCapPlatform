<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ciudades</title>
</head>
<body>
    <h1>Lista de Ciudades</h1>

    <table border="1">
        <tr>
            <th>ID</th>
            <th>Nombre</th>
        </tr>
        <tr th:each="c : ${ciudades}">
            <td th:text="${c.idCiudad}"></td>
            <td th:text="${c.nombre}"></td>
        </tr>
    </table>
</body>
</html>
